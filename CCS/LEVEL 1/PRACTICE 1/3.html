<!-- create a button and set its background color to :
 1. green using css stylesheet
 2. blue using <style> tag
 3. pink using in line style -->

 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>practice</title>
    <link rel="stylesheet" href="/CCS/LEVEL 1/PRACTICE/3.css">
    <!-- link this file with the CSS file-->

 </head>
 <body>

    <main>
        <button id="but1">CLICK MEE !!</button><br>      <!-- change the bg color using CSS file-->
        <button class="but2">CLICK MEE !!</button><br>   <!-- changed using style tag in HTML-->

        <style>
            .but2{
                background-color: blue;
            }
        </style>

        <button style="background-color: pink;">CLICK MEE !!</button>  <!-- changed bg color using in line style tag-->
    </main>

 </body>
 </html>
