<!-- create a simple div with an id "box" add some text content inside the div
 set its background colour to blue -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>practice</title>
 </head>
 <body>
   <main>
      <div id="box">
         <p><b>hello this is a normal paragraph</b></p>
      </div>
      
      <!-- used style tag in html -->
      <style>       
         #box{
            background-color: blue;
         }
      </style>

   </main>
    
 </body>
 </html>
