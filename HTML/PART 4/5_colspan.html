<!-- calspan in tables -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calspan</title>
 </head>
 <body>
    
    <table>

        <caption><b>
            student data
        </b></caption>

        <thead>
            <tr>
                <th colspan="2">INFORMATION</th>    <!-- this tells the header to allign itself with how many rows-->
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>shaurya singhal</td>
                <td>590023883</td>
            </tr>
        </tbody>

    </table>
 </body>
 </html>
