<!-- check box -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkbox</title>
 </head>
 <body>

    <!-- in checkbox we can select multiple options not like lable where we can select only one-->
    <label for="maths">
        <input type="checkbox" value="maths" class="group1" id="101"><b>maths</b>
    </label><br>

    <label for="physics">
        <input type="checkbox" value="physics" class="group1" id="102"><b>physics</b>
    </label><br>

    <label for="programming in c">
        <input type="checkbox" value="c" class="group1" id="101"><b>programming in c</b>
    </label><br>

    <label for="problem solving">
        <input type="checkbox" value="ps" class="group1" id="101"><b>problem solving</b>
    </label><br>

    <label for="evs">
        <input type="checkbox" value="evs" class="group1" id="101"><b>evs</b>
    </label><br>
    
 </body>
 </html>
