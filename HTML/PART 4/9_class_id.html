<!-- class and id -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>class and id</title>
 </head>
 <body>
    <main>
        <!-- id is like a student name of a student in a class of 50 students -->
        <div id="id1" class="group1">   
        </div>

        <!-- and class represents a whole group -->
        <div id="id2" class="group1">
        </div>

    </main>
 </body>
 </html>
