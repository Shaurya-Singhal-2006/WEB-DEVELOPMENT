<!-- iframe tag -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe</title>
 </head>
 <body>
    <!-- it helps to create a website opener in the page for the provided link -->

    <h1>the video i studied from</h1>
    <hr>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/HcOc7P5BMi4?si=xUUPa2pnmgqernd8" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <hr>

    <h3>wikipedia</h3>

    <iframe src="https://www.wikipedia.org/" height="1000" width="1000"></iframe>
    <hr>

 </body>
 </html>
