 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
 </head>
 <body>
    <main>

    <table>

        <caption><b><u>student information</u></b></caption>   <!-- caption to add a caption for the table-->

        <tr>                <!-- tr represents table row-->
        <th><i>name</i></th>       <!-- th represents table header-->
        <th><i>sap id</i></th>
        <th><i>college</i></th>
        </tr>

        <tr>
            <td>shaurya singhal</td>    <!-- td represents table data-->
            <td>590023883</td>
            <td>UPES dehradhun</td>
        </tr>

        <tr>
            <td>raghav</td>
            <td>590023556</td>
            <td>UPES dehradhun</td>
        </tr>

    </table>

    </main>
 </body>
 </html>
