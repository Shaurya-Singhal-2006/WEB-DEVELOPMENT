 <head>
    <meta charset="UTF-8">

    <title>Forms</title>
 </head>
 <body>

    <form action="/action.php">
        <input type="text" placeholder="username"><br>     <!-- placeholder displayes the text inside the box-->

        <input type="password" placeholder="enter password"><br>   <!-- information will be hidden when entered-->
        
        
        <label for="class 10">
            <input type="radio" value="class 10" name="class" id="id1">class 10<sup>th</sup><br>

        </label>

        <label for="class 12">
            <input type="radio" value="class 12" name="class" id="id2">class 12<sup>th</sup>
        </label>
    </form>
    
 </body>
 </html>
