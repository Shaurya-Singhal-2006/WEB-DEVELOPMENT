<!-- thead and tbody tags in table -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tbody and thead in tables</title>
 </head>
 <body>
    <table>

        <caption><b><i>student info</i></b></caption>
        
        <thead>           <!-- this does not make visible changes to the page-->
        <tr>              <!-- but it wraps the head of the table-->
            <th>name</th>
            <th>sap id</th>
        </tr>
        </thead>

        <tbody>         <!-- this does not make visible changes to the page-->
            <tr>        <!-- this wraps the body of the table-->
                <td>shaurya singhal</td>
                <td>590023883</td>
            </tr>
        </tbody>

    </table>
    
 </body>
 </html>
