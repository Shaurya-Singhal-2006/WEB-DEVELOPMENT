<!-- list -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
 </head>
 <body>
    <main>
    <ul>              <!-- unordered list-->
        <li>apple</li>
        <ul>
            <li>colour : red</li>      <!-- this is creating a sub unordered list-->
        </ul>
        <li>mango</li>
        <ul>
            <li>
                colour : yellow
            </li>
        </ul>
    </ul>
    <ol>              <!-- ordered list-->
        <li>apple</li>
        <ul>
            <li>
                colour : red
            </li>
        </ul>
        <li>mango</li>
        <ol>
            <li>
                colour : yellow        <!-- this here created a sub ordered list -->
            </li>
        </ol>
    </ol>
    </main>
 </body>
 </html>
