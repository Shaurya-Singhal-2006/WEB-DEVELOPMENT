<!-- LABLE -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>label</title>
 </head>
 <body>

    <!-- in lable we can only select one option not multiple  -->
    <label for="id1">
        <input type="radio" value="class X" name="class" id="id1">
    </label> 
    
    <label for="id2">
        <input type="radio" value="class X" name="class" id="id2">
    </label>
    <!-- when we use for in lable we can click on the text to select the option
    we dont have to click on the dot to check the option -->

 </body>
 </html>
