<!-- BOLD ITALIC AND UNDERLINE TAG -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOLD ITALIC AND UNDERLINE TAG</title>
</head>
<body>
    <b>BOLD</b><br>
    <i>ITALIC</i><br>
    <u>UNDERLINE</u>
    <br><br>
    <p>hello my name is <b><i>shaurya</i></b></p>  <!-- we can all these tages in between the paragraphs as well -->
</body>
</html>
