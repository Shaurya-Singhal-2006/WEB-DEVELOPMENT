<!-- hr tag -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR tag</title>
 </head>
 <body>
    <p>Hello my name is <b>shaurya</b></p>
    <hr>    <!-- hr means (HORIZONTAL RULER)-->                             
    <!-- this hr seperated the content with a horizontal line to make it look more clean-->
    <big>hello my name is <b>shaurya</b></big>
 </body>
 </html>
