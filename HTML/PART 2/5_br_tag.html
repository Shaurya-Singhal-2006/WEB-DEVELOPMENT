<!-- tag used to break line or move to another line -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>br tag</title>
 </head>
 <body>
    <main>
        <p>hello</p>
        <br>                   <!-- this added a next line-->
        <p>world</p>
    </main>
 </body>
 </html>
