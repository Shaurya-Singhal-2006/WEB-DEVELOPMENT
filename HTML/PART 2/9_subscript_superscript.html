<!-- subscript and superscript -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>subscript and superscript</title>
 </head>
 <body>
    <p>this is a formula <big>H<sub>2</sub>O</big></p><br> 
    <!-- this is a example of subscript-->
    <p> this is a maths equation <big>3<sup>3</sup> = 9</big></p><br>
    <!-- this is an example of super script -->
 </body>
 </html>
