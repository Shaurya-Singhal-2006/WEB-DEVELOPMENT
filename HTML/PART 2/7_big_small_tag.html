<!-- big and small tag -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>big and small tag</title>
 </head>
 <body>
    <big> this tag shows big text</big><br>       
    <!-- this is used to show big text on your page-->
    <small> this tag shows small text</small><br> 
    <!-- this is used to show small text on your page-->
 </body>
 </html>
