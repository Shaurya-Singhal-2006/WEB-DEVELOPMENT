<!DOCTYPE html>     <!-- tells browser you are using HTML5-->
<html lang="en">    <!-- root of an HTML document-->
<head>              <!-- conatains metadata-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <!-- tells the site to be responsive (looks good on multiple devices)-->
    <title>Document</title>      <!-- stores the title of the HTML page-->
</head>
<body>
    <p>hello world</p>     <!-- contains all data rendered by the browser-->
</body>
</html>
