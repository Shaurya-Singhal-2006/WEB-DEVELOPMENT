 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>span tag</title>
 </head>
 <body>
    <span>
        hello   world    <!-- this will not cover the entire horizontal space 
        it will only cover the space occupied by the word -->
    </span>
 </body>
 </html>
