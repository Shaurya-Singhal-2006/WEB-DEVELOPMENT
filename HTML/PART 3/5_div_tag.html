<!-- div tag -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>div tag</title>
 </head>
 <body>
    <div>              <!-- this is a seperate container -->
        <p>hello</p>
        <p>namaste</p>
    </div><br>
    <div>             <!-- this is a seperate container -->
        <p>bye</p>
        <p>goodbye</p>
    </div>           <!-- this will cover the entire width of the page-->
 </body>
 </html>
 <!-- changes done line background colur or text colour of div will make changes in the whole container -->
